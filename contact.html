<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Pour que le site s’adapte à la largeur de l’écran -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Contact | Kambala Mpoyi Junior</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">ACCUEIL</a>
        <a href="apropos.html">À PROPOS</a>
        <a href="competences.html">COMPETENCES</a>
        <a href="projets.html">PROJETS</a>
        <a href="contact.html" class="active">CONTACT</a>
    </nav>
    <!-- Section contact -->
    <main>
        <h1>Me contacter</h1>

        <!-- Formulaire de contact -->

        
        <form action="https://formspree.io/f/xwvavwvl" method="POST" id="contact-form" class="contact-form">
            <input type="hidden" name="form-name" value="contact">
    
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="name" placeholder="Veuillez entrer votre nom complet" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Veuillez entrer votre adresse mail" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Votre message ici..." required></textarea>

            <button type="submit">Envoyer</button>
        </form>

    </main>

    <script src="js/main.js"></script>
</body>
</html>
