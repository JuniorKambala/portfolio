<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Pour que le site s’adapte à la largeur de l’écran -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Contact | Kambala Mpoyi Junior</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">ACCUEIL</a>
        <a href="apropos.html">À PROPOS</a>
        <a href="competences.html">COMPETENCES</a>
        <a href="projets.html">PROJETS</a>
        <a href="contact.html" class="active">CONTACT</a>
    </nav>
    <!-- Section contact -->
    <main>
        <h1>Me contacter</h1>

        <!-- Formulaire de contact -->

        
        <form data-netlify="true" id="contact-form" class="contact-form">
            <input type="hidden" name="form-name" value="contact" >
            <input type="hidden" name="redirect" value="https://jolly-meerkat-1eba74.netlify.app/contact.html?success=true">

            <!-- Champ nom -->
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="name" placeholder="Veuillez entrer votre nom complet" required>

            <!-- Champ email -->
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Veuillez entrer votre adresse mail" required>

            <!-- Champ message -->
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Votre message ici..." required></textarea>

            <!-- Bouton envoyer -->
            <button type="submit">Envoyer</button>

        </form>

        <div id="message-succes" style="display: none; text-align: center; padding: 40px; background: #d4edda; border-radius: 10px; margin-top: 30px;">
            <h2>Message envoyé !</h2>
            <p>Merci de m'avoir contacté. Je vous répondrais dans les plus brefs délais.</p>
            <a href="index.html"> Retour à l'accueil</a>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
